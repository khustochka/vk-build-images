name: Build Quails images

# Builds and pushes multi-arch (amd64 + arm64) quails-base and quails-build
# images to ECR Public.
#
# Per-arch builds run on native runners (ubuntu-24.04 for amd64,
# ubuntu-24.04-arm for arm64), push by digest, then a merge step assembles a
# multi-arch manifest list pointing to both digests.
#
# Required repo configuration:
#   secrets.AWS_ROLE_ARN   - IAM role assumable via GitHub OIDC. Needs
#                              ecr-public push permissions on quails-base and
#                              quails-build, plus sts:GetServiceBearerToken.

on:
  workflow_dispatch:
    inputs:
      ruby_version:
        description: "Ruby version"
        required: true
        default: "4.0.5"
      node_version:
        description: "Node.js version"
        required: true
        default: "24.15.0"
      debug:
        description: "Include debug packages in base image"
        type: boolean
        required: true
        default: false
  # push:
  #   branches: [main]
  #   paths:
  #     - "quails/**"
  #     - ".github/workflows/build-quails-images.yml"

env:
  ECR_REGISTRY: public.ecr.aws/m7x1i1o0
  BASE_REPO: quails-base
  BUILD_REPO: quails-build
  DEFAULT_RUBY_VERSION: "4.0.5"
  DEFAULT_NODE_VERSION: "24.15.0"

permissions:
  id-token: write
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      ruby_version: ${{ steps.vars.outputs.ruby_version }}
      node_version: ${{ steps.vars.outputs.node_version }}
      debug: ${{ steps.vars.outputs.debug }}
      timestamp: ${{ steps.vars.outputs.timestamp }}
      base_tag: ${{ steps.vars.outputs.base_tag }}
      build_tag: ${{ steps.vars.outputs.build_tag }}
    steps:
      - id: vars
        run: |
          ruby="${{ inputs.ruby_version || env.DEFAULT_RUBY_VERSION }}"
          node="${{ inputs.node_version || env.DEFAULT_NODE_VERSION }}"
          debug="${{ inputs.debug || 'false' }}"
          ts="$(date -u +%Y%m%d-%H%M%S)"
          base_tag="ruby${ruby}-${ts}"
          build_tag="ruby${ruby}-node${node}-${ts}"
          {
            echo "ruby_version=${ruby}"
            echo "node_version=${node}"
            echo "debug=${debug}"
            echo "timestamp=${ts}"
            echo "base_tag=${base_tag}"
            echo "build_tag=${build_tag}"
          } >> "$GITHUB_OUTPUT"
          echo "Will build:"
          echo "  ${ECR_REGISTRY}/${BASE_REPO}:${base_tag}"
          echo "  ${ECR_REGISTRY}/${BUILD_REPO}:${build_tag}"

  base-build:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        arch:
          - { name: amd64, platform: linux/amd64, runner: ubuntu-24.04 }
          - { name: arm64, platform: linux/arm64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.arch.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - uses: docker/setup-buildx-action@v4

      - id: push
        uses: docker/build-push-action@v7
        with:
          context: quails
          file: quails/base.Dockerfile
          platforms: ${{ matrix.arch.platform }}
          push: true
          build-args: |
            RUBY_VERSION=${{ needs.setup.outputs.ruby_version }}
            DEBUG=${{ needs.setup.outputs.debug }}
          outputs: type=image,name=${{ env.ECR_REGISTRY }}/${{ env.BASE_REPO }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.push.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v7
        with:
          name: base-digests-${{ matrix.arch.name }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  base-merge:
    needs: [setup, base-build]
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.ref.outputs.image_ref }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: base-digests-*
          merge-multiple: true

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - uses: docker/setup-buildx-action@v4

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t "${ECR_REGISTRY}/${BASE_REPO}:${{ needs.setup.outputs.base_tag }}" \
            $(printf "${ECR_REGISTRY}/${BASE_REPO}@sha256:%s " *)

      - name: Inspect
        run: |
          docker buildx imagetools inspect "${ECR_REGISTRY}/${BASE_REPO}:${{ needs.setup.outputs.base_tag }}"

      - id: ref
        run: |
          echo "image_ref=${ECR_REGISTRY}/${BASE_REPO}:${{ needs.setup.outputs.base_tag }}" >> "$GITHUB_OUTPUT"

  build-build:
    needs: [setup, base-merge]
    strategy:
      fail-fast: false
      matrix:
        arch:
          - { name: amd64, platform: linux/amd64, runner: ubuntu-24.04 }
          - { name: arm64, platform: linux/arm64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.arch.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - uses: docker/setup-buildx-action@v4

      - id: push
        uses: docker/build-push-action@v7
        with:
          context: quails
          file: quails/build.Dockerfile
          platforms: ${{ matrix.arch.platform }}
          push: true
          build-args: |
            BASE_IMAGE=${{ needs.base-merge.outputs.image_ref }}
            NODE_VERSION=${{ needs.setup.outputs.node_version }}
          outputs: type=image,name=${{ env.ECR_REGISTRY }}/${{ env.BUILD_REPO }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.push.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v7
        with:
          name: build-digests-${{ matrix.arch.name }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  build-merge:
    needs: [setup, build-build]
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.ref.outputs.image_ref }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: build-digests-*
          merge-multiple: true

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - uses: docker/setup-buildx-action@v4

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t "${ECR_REGISTRY}/${BUILD_REPO}:${{ needs.setup.outputs.build_tag }}" \
            $(printf "${ECR_REGISTRY}/${BUILD_REPO}@sha256:%s " *)

      - name: Inspect
        run: |
          docker buildx imagetools inspect "${ECR_REGISTRY}/${BUILD_REPO}:${{ needs.setup.outputs.build_tag }}"

      - id: ref
        run: |
          echo "image_ref=${ECR_REGISTRY}/${BUILD_REPO}:${{ needs.setup.outputs.build_tag }}" >> "$GITHUB_OUTPUT"

  summary:
    needs: [setup, base-merge, build-merge]
    runs-on: ubuntu-latest
    steps:
      - run: |
          {
            echo "### Images pushed (multi-arch: amd64 + arm64)"
            echo ""
            echo "- \`${{ needs.base-merge.outputs.image_ref }}\`"
            echo "- \`${{ needs.build-merge.outputs.image_ref }}\`"
            echo ""
            echo "Ruby: \`${{ needs.setup.outputs.ruby_version }}\`  "
            echo "Node: \`${{ needs.setup.outputs.node_version }}\`  "
            echo "Debug: \`${{ needs.setup.outputs.debug }}\`  "
            echo "Timestamp: \`${{ needs.setup.outputs.timestamp }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  dispatch-quails:
    needs: [setup, base-merge, build-merge]
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to quails
        env:
          GH_TOKEN: ${{ secrets.QUAILS_DISPATCH_TOKEN }}
          BASE_IMAGE: ${{ needs.base-merge.outputs.image_ref }}
          BUILD_IMAGE: ${{ needs.build-merge.outputs.image_ref }}
          RUBY_VERSION: ${{ needs.setup.outputs.ruby_version }}
          NODE_VERSION: ${{ needs.setup.outputs.node_version }}
          TIMESTAMP: ${{ needs.setup.outputs.timestamp }}
          SOURCE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api repos/khustochka/quails/dispatches \
            -f event_type=build-images-published \
            -f "client_payload[base_image]=${BASE_IMAGE}" \
            -f "client_payload[build_image]=${BUILD_IMAGE}" \
            -f "client_payload[ruby_version]=${RUBY_VERSION}" \
            -f "client_payload[node_version]=${NODE_VERSION}" \
            -f "client_payload[timestamp]=${TIMESTAMP}" \
            -f "client_payload[source_run_url]=${SOURCE_RUN_URL}"
